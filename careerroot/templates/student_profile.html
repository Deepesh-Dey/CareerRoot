{% extends "base.html" %}

{% block content %}
<div class="container" style="margin-top:30px; margin-bottom:30px;">
    <div class="row">
        <div class="col-md-8">
            <div style="background-color:lightblue; padding:20px; border:2px solid darkblue; border-radius:5px;">
                <h2 style="color:darkblue; margin-bottom:20px;">Update Your Profile</h2>
                
                <form method="POST" style="font-family:Arial; font-size:14px;">
                    <div style="margin-bottom:15px;">
                        <label for="name" style="display:block; margin-bottom:5px; font-weight:bold;">Full Name</label>
                        <input type="text" id="name" name="name" value="{{ student.name }}" required 
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="phone" style="display:block; margin-bottom:5px; font-weight:bold;">Phone Number</label>
                        <input type="text" id="phone" name="phone" value="{{ student.phone or '' }}" 
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="department" style="display:block; margin-bottom:5px; font-weight:bold;">Department</label>
                        <input type="text" id="department" name="department" value="{{ student.department or '' }}" 
                               placeholder="e.g., Computer Science"
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="cgpa" style="display:block; margin-bottom:5px; font-weight:bold;">CGPA</label>
                        <input type="number" id="cgpa" name="cgpa" step="0.01" value="{{ student.cgpa or '' }}" 
                               placeholder="e.g., 8.5"
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-top:20px;">
                        <button type="submit" style="background-color:blue; color:white; padding:10px 20px; border:none; border-radius:3px; cursor:pointer; font-weight:bold;">
                            Update Profile
                        </button>
                        <a href="{{ url_for('student_dashboard') }}" style="margin-left:10px; background-color:lightgray; color:black; padding:10px 20px; border:none; border-radius:3px; text-decoration:none; font-weight:bold;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
