{% extends "base.html" %}

{% block title %}Login - CareerRoot{% endblock %}

{% block content %}
<style>
    .card {
        min-height: 400px;
        display: flex;
        flex-direction: column;
    }
    .card-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
</style>

<div class="row justify-content-center mt-5">
    <div class="col-md-12">
        <h2 class="text-center mb-5">CareerRoot - Login Portal</h2>
    </div>
</div>

<div class="row mb-5">
    <!--student login-->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Student Login</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="user_type" value="student">
                    <div class="mb-3">
                        <label for="student_email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="student_email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="student_password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="student_password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <div class="mt-3 text-center">
                    <small>New student? <a href="{{ url_for('auth.student_register') }}">Register here</a></small>
                </div>
            </div>
        </div>
    </div>

    <!--company login-->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Company Login</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="user_type" value="company">
                    <div class="mb-3">
                        <label for="company_email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="company_email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="company_password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="company_password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Login</button>
                </form>
                <div class="mt-3 text-center">
                    <small>New company? <a href="{{ url_for('auth.company_register') }}">Register here</a></small>
                </div>
            </div>
        </div>
    </div>

    <!--admin login-->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Admin Login</h5>
            </div>
            <div class="card-body">
                <div>
                    <form method="POST">
                        <input type="hidden" name="user_type" value="admin">
                        <div class="mb-3">
                            <label for="admin_username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="admin_username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="admin_password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="admin_password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
