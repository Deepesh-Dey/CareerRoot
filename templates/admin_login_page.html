<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CareerRoot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        /* Responsive background and body */
        body {
            background: linear-gradient(135deg, indigo, violet);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        /* Custom navbar styling */
        .navbar-custom {
            background: linear-gradient(135deg, indigo, violet);
            padding: 15px 20px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar-custom a {
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
        }
        .navbar-custom a:hover {
            opacity: 0.9;
        }
        /* Login card styling */
        .login-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid indigo;
        }
        .login-card h2 {
            color: indigo;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
        /* Form styling with Bootstrap classes */
        .form-label {
            font-weight: bold;
            color: darkslategray;
        }
        .form-control:focus {
            border-color: indigo;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.25);
        }
        /* Button styling */
        .btn-login {
            background: linear-gradient(135deg, indigo, violet);
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            color: white;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, blueviolet, darkviolet);
            border: none;
            color: white;
        }
        /* Responsive adjustments */
        @media (max-width: 576px) {
            .login-card {
                padding: 20px;
            }
            .login-card h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="navbar-custom">
        <a href="{{ url_for('auth.homepage') }}">← Back to Home</a>
    </div>

    <!-- Main container with responsive width -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <!-- Alert messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'success' }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- Login Card -->
                <div class="login-card">
                    <h2>Admin Login</h2>

                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required minlength="3" maxlength="20" 
                                   placeholder="Enter your username" title="Username must be 3-20 characters">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="8" 
                                   placeholder="Enter your password" title="Password must be at least 8 characters">
                        </div>

                        <!-- Hidden field to specify user type -->
                        <input type="hidden" name="user_type" value="admin">

                        <!-- Responsive button group -->
                        <div class="d-grid gap-2 d-sm-flex">
                            <button type="submit" class="btn btn-login flex-sm-grow-1">Login</button>
                            <a href="{{ url_for('auth.homepage') }}" class="btn btn-light flex-sm-grow-1">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
