{% extends "base.html" %}

{% block content %}
<div class="container" style="margin-top:30px; margin-bottom:30px;">
    <div class="row">
        <div class="col-md-8">
            <div style="background-color:lightblue; padding:20px; border:2px solid darkblue; border-radius:5px;">
                <h2 style="color:darkblue; margin-bottom:20px;">Post New Job Position</h2>
                
                <form method="POST" style="font-family:Arial; font-size:14px;">
                    <div style="margin-bottom:15px;">
                        <label for="job_title" style="display:block; margin-bottom:5px; font-weight:bold;">Job Title *</label>
                        <input type="text" id="job_title" name="job_title" required minlength="3" maxlength="100"
                               placeholder="Enter job title" title="Job title must be 3-100 characters"
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="job_description" style="display:block; margin-bottom:5px; font-weight:bold;">Job Description *</label>
                        <textarea id="job_description" name="job_description" rows="4" required minlength="10"
                                  placeholder="Enter detailed job description" title="Description must be at least 10 characters"
                                  style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;"></textarea>
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="eligibility_criteria" style="display:block; margin-bottom:5px; font-weight:bold;">Eligibility Criteria</label>
                        <textarea id="eligibility_criteria" name="eligibility_criteria" rows="3" 
                                  placeholder="Enter eligibility requirements"
                                  style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;"></textarea>
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="skills_required" style="display:block; margin-bottom:5px; font-weight:bold;">Skills Required (comma separated)</label>
                        <input type="text" id="skills_required" name="skills_required" 
                               placeholder="e.g., Python, Java, SQL"
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="experience_required" style="display:block; margin-bottom:5px; font-weight:bold;">Experience Required</label>
                        <input type="text" id="experience_required" name="experience_required" 
                               placeholder="e.g., 0-2 years"
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="salary_range" style="display:block; margin-bottom:5px; font-weight:bold;">Salary Range (LPA)</label>
                        <input type="text" id="salary_range" name="salary_range" 
                               placeholder="e.g., 5-8 LPA"
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-bottom:15px;">
                        <label for="application_deadline" style="display:block; margin-bottom:5px; font-weight:bold;">Application Deadline *</label>
                        <input type="datetime-local" id="application_deadline" name="application_deadline" required 
                               title="Deadline must be in the future"
                               style="width:100%; padding:8px; border:1px solid darkblue; border-radius:3px;">
                    </div>
                    
                    <div style="margin-top:20px;">
                        <button type="submit" style="background-color:blue; color:white; padding:10px 20px; border:none; border-radius:3px; cursor:pointer; font-weight:bold;">
                            Post Job
                        </button>
                        <a href="{{ url_for('company.jobs') }}" style="margin-left:10px; background-color:lightgray; color:black; padding:10px 20px; border:none; border-radius:3px; text-decoration:none; font-weight:bold;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
